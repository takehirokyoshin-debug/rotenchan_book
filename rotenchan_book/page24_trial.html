<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>初めまして ろてんちゃんです - page trial</title>
  <style>
    :root {
      --paper: rgba(255, 252, 244, 0.68);
      --ink: #3f3830;
      --accent: #6aa8c8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #e9eef1;
      font-family: "Yu Gothic", "Hiragino Sans", "Meiryo", sans-serif;
      color: var(--ink);
    }

    .book-page {
      position: relative;
      width: min(96vw, 1200px);
      aspect-ratio: 3 / 2;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 18px 50px rgba(52, 60, 67, 0.22);
    }

    .book-page img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .text-panel {
      position: absolute;
      right: clamp(22px, 5vw, 70px);
      bottom: clamp(22px, 5vw, 58px);
      width: min(39%, 430px);
      padding: clamp(18px, 2.5vw, 30px);
      border-left: 5px solid rgba(106, 168, 200, 0.8);
      background: var(--paper);
      backdrop-filter: blur(2px);
      line-height: 1.9;
      font-size: clamp(15px, 1.9vw, 25px);
      font-weight: 400;
      letter-spacing: 0;
    }

    .text-panel p {
      margin: 0;
    }

    .text-panel p + p {
      margin-top: 0.85em;
    }

    .inner-voice {
      color: #5d5046;
      font-weight: 400;
    }

    @media (max-width: 720px) {
      body {
        align-items: start;
        padding: 12px;
      }

      .book-page {
        width: 100%;
        aspect-ratio: 2 / 3;
      }

      .book-page img {
        object-position: center;
      }

      .text-panel {
        left: 14px;
        right: 14px;
        bottom: 14px;
        width: auto;
        padding: 16px 17px;
        font-size: 16px;
        line-height: 1.75;
      }
    }
  </style>
</head>
<body>
  <main class="book-page" aria-label="絵本ページの試作">
    <img src="assets/page24_adult_weather_forecaster.png" alt="大人になった女の子が気象予報士として天気予報をしている場面">
    <section class="text-panel" aria-label="本文">
      <p>女の子は、大きくなって、<br>気象予報士になりました。</p>
      <p>雲ができるしくみも、<br>雨のはじまりも、<br>ちゃんと説明できます。</p>
      <p class="inner-voice">でも、心の中では思っています。</p>
      <p class="inner-voice">ほんとは、ろてんちゃんたちが、<br>一生懸命はたらいているんだけどね。</p>
    </section>
  </main>
</body>
</html>
