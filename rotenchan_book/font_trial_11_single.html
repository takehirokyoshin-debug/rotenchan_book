<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>11ページ フォント切り替え</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #e9eef1;
      color: #3f3830;
      font-family: "Yu Gothic", "Hiragino Sans", "Meiryo", sans-serif;
    }

    .shell {
      width: min(96vw, 1220px);
    }

    .book-page {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 2;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 18px 50px rgba(52, 60, 67, 0.22);
    }

    .book-page img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .text {
      position: absolute;
      left: clamp(22px, 5vw, 70px);
      top: clamp(22px, 5vw, 58px);
      width: min(47%, 520px);
      color: #2f2a25;
      font-size: clamp(15px, 1.75vw, 24px);
      font-weight: 400;
      line-height: 1.9;
      letter-spacing: 0;
      text-shadow:
        0 0 5px rgba(255, 255, 255, 1),
        0 0 10px rgba(255, 255, 255, 0.98),
        0 0 18px rgba(255, 255, 255, 0.94),
        1px 1px 3px rgba(255, 255, 255, 1),
        -1px -1px 3px rgba(255, 255, 255, 1);
    }

    .text p {
      margin: 0;
    }

    .text p + p {
      margin-top: 0.85em;
    }

    .font-yu {
      font-family: "Yu Gothic", "Hiragino Sans", "Meiryo", sans-serif;
    }

    .font-meiryo {
      font-family: "Meiryo", "Yu Gothic", sans-serif;
    }

    .font-biz {
      font-family: "BIZ UDPGothic", "Yu Gothic", "Meiryo", sans-serif;
    }

    .font-mincho {
      font-family: "Yu Mincho", "Hiragino Mincho ProN", "BIZ UDPMincho", serif;
      font-weight: 500;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      padding-top: 16px;
    }

    button,
    a {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: #fff;
      color: #41525b;
      box-shadow: 0 8px 24px rgba(52, 60, 67, 0.14);
      font-size: 15px;
      text-decoration: none;
      cursor: pointer;
    }

    button.active {
      background: #d9eef8;
      color: #274c5f;
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="book-page">
      <img src="assets/page11_puddle_absorb.png" alt="11ページ">
      <div class="text font-meiryo" id="sampleText">
        <p>水たまりでも同じです。</p>
        <p>小さな子たちは、いっしょうけんめい<br>水を頭のコップに集めています。</p>
      </div>
    </section>
    <nav class="controls" aria-label="フォント切り替え">
      <button type="button" data-font="font-yu">Yu Gothic</button>
      <button type="button" data-font="font-meiryo" class="active">Meiryo</button>
      <button type="button" data-font="font-biz">BIZ UDPGothic</button>
      <button type="button" data-font="font-mincho">Yu Mincho</button>
      <a href="index.html?p=11">絵本ページへ戻る</a>
    </nav>
  </main>

  <script>
    const text = document.getElementById("sampleText");
    const buttons = [...document.querySelectorAll("button[data-font]")];
    buttons.forEach((button) => {
      button.addEventListener("click", () => {
        text.className = `text ${button.dataset.font}`;
        buttons.forEach((item) => item.classList.toggle("active", item === button));
      });
    });
  </script>
</body>
</html>
